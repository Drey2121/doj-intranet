<script>
let firstLogin=true;
function login(){
 if(firstLogin){
 document.getElementById('login').classList.add('hidden');
 document.getElementById('changePw').classList.remove('hidden');
 } else openApp();
}
function changePw(){
 if(newpw1.value!==newpw2.value){alert('Passwörter unterschiedlich');return}
 firstLogin=false;openApp();
}
function openApp(){
 document.getElementById('changePw').classList.add('hidden');
 document.getElementById('login').classList.add('hidden');
 document.getElementById('app').classList.remove('hidden');
}
function show(id){
 document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));
 document.getElementById(id).classList.remove('hidden');
}
let fine=0,jail=0,pars=[];
function calc(box,f,j,p){
 if(box.checked){fine+=f;jail+=j;pars.push(p)}
 else{fine-=f;jail-=j;pars=pars.filter(x=>x!==p)}
 sumFine.innerText=fine;
 sumJail.innerText=jail;
 charges.value=pars.join(', ')
}
function copyCharges(){navigator.clipboard.writeText(charges.value);alert('Kopiert');}
function filterOffenses(){
 let q=search.value.toLowerCase();
 document.querySelectorAll('#fineTable tr[data-title]').forEach(r=>{
 r.style.display=r.dataset.title.toLowerCase().includes(q)?'':'none';
})}
</script>
